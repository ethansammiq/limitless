<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WEATHER EDGE — Scan Terminal</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&family=Instrument+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0c10;
  --bg-card: #0f1117;
  --bg-card-hover: #141720;
  --bg-surface: #181c26;
  --border: #1e2330;
  --border-active: #2a3040;
  --text: #c8cdd8;
  --text-dim: #6b7280;
  --text-bright: #e8ecf4;
  --amber: #f59e0b;
  --amber-dim: #b45309;
  --amber-glow: rgba(245, 158, 11, 0.08);
  --cyan: #22d3ee;
  --cyan-dim: #0891b2;
  --cyan-glow: rgba(34, 211, 238, 0.06);
  --green: #22c55e;
  --green-dim: #15803d;
  --red: #ef4444;
  --red-dim: #991b1b;
  --purple: #a78bfa;
  --blue: #60a5fa;
  --mono: 'JetBrains Mono', 'Fira Code', monospace;
  --sans: 'Instrument Sans', -apple-system, sans-serif;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

html { font-size: 13px; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--mono);
  min-height: 100vh;
  overflow-x: hidden;
}

/* Scanline overlay */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 9999;
  background: repeating-linear-gradient(
    0deg,
    transparent,
    transparent 2px,
    rgba(0,0,0,0.03) 2px,
    rgba(0,0,0,0.03) 4px
  );
}

/* ─── HEADER ─── */
.header {
  border-bottom: 1px solid var(--border);
  padding: 16px 24px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  background: linear-gradient(180deg, rgba(245,158,11,0.03) 0%, transparent 100%);
}

.header-left {
  display: flex;
  align-items: center;
  gap: 16px;
}

.logo {
  font-family: var(--sans);
  font-weight: 700;
  font-size: 1.15rem;
  letter-spacing: 0.08em;
  color: var(--amber);
  text-transform: uppercase;
  display: flex;
  align-items: center;
  gap: 8px;
}

.logo-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: var(--green);
  box-shadow: 0 0 8px var(--green);
  animation: pulse 2s ease-in-out infinite;
}

@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.4; }
}

.header-meta {
  font-size: 0.85rem;
  color: var(--text-dim);
  display: flex;
  gap: 20px;
}

.header-meta span { display: flex; align-items: center; gap: 5px; }
.meta-label { color: var(--text-dim); }
.meta-value { color: var(--text); font-weight: 500; }
.meta-value.balance { color: var(--green); }

/* ─── STAT STRIP ─── */
.stat-strip {
  display: flex;
  border-bottom: 1px solid var(--border);
  background: var(--bg-card);
}

.stat-cell {
  flex: 1;
  padding: 12px 20px;
  border-right: 1px solid var(--border);
  text-align: center;
}

.stat-cell:last-child { border-right: none; }

.stat-number {
  font-size: 1.6rem;
  font-weight: 700;
  color: var(--text-bright);
  line-height: 1;
}

.stat-number.highlight { color: var(--amber); }
.stat-number.danger { color: var(--red); }
.stat-number.success { color: var(--green); }

.stat-label {
  font-size: 0.7rem;
  color: var(--text-dim);
  text-transform: uppercase;
  letter-spacing: 0.1em;
  margin-top: 4px;
}

/* ─── CITY GRID ─── */
.city-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(380px, 1fr));
  gap: 1px;
  background: var(--border);
  margin: 0;
}

.city-card {
  background: var(--bg-card);
  padding: 0;
  transition: background 0.2s;
  position: relative;
  overflow: hidden;
}

.city-card::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 2px;
  background: var(--border);
  transition: background 0.3s;
}

.city-card.conf-high::before { background: var(--amber); box-shadow: 0 0 20px var(--amber-glow); }
.city-card.conf-medium::before { background: var(--cyan); }
.city-card.conf-low::before { background: var(--border-active); }

/* City Header */
.city-header {
  padding: 14px 16px 10px;
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
}

.city-name {
  font-family: var(--sans);
  font-weight: 700;
  font-size: 1rem;
  color: var(--text-bright);
  letter-spacing: 0.02em;
}

.city-key {
  color: var(--text-dim);
  font-weight: 400;
  font-size: 0.85rem;
  margin-left: 6px;
}

.conf-badge {
  padding: 3px 10px;
  border-radius: 3px;
  font-size: 0.75rem;
  font-weight: 600;
  letter-spacing: 0.05em;
  white-space: nowrap;
}

.conf-badge.elite { background: rgba(245,158,11,0.15); color: var(--amber); border: 1px solid var(--amber-dim); }
.conf-badge.high { background: rgba(245,158,11,0.1); color: var(--amber); border: 1px solid rgba(245,158,11,0.3); }
.conf-badge.medium { background: rgba(34,211,238,0.1); color: var(--cyan); border: 1px solid rgba(34,211,238,0.3); }
.conf-badge.low { background: rgba(107,114,128,0.1); color: var(--text-dim); border: 1px solid var(--border); }

/* Confidence Gauge */
.conf-gauge-wrap {
  padding: 0 16px 8px;
}

.conf-gauge-bar {
  height: 4px;
  background: var(--border);
  border-radius: 2px;
  overflow: hidden;
  position: relative;
}

.conf-gauge-fill {
  height: 100%;
  border-radius: 2px;
  transition: width 1s ease;
  position: relative;
}

.conf-gauge-fill.elite { background: linear-gradient(90deg, var(--amber-dim), var(--amber)); }
.conf-gauge-fill.high { background: linear-gradient(90deg, var(--amber-dim), var(--amber)); }
.conf-gauge-fill.medium { background: linear-gradient(90deg, var(--cyan-dim), var(--cyan)); }
.conf-gauge-fill.low { background: var(--text-dim); opacity: 0.4; }

/* Ensemble Strip */
.ensemble-strip {
  display: flex;
  padding: 0 16px 10px;
  gap: 16px;
  font-size: 0.8rem;
}

.ens-stat { display: flex; flex-direction: column; }
.ens-stat-val { color: var(--text-bright); font-weight: 600; font-size: 1.1rem; }
.ens-stat-label { color: var(--text-dim); font-size: 0.65rem; text-transform: uppercase; letter-spacing: 0.08em; }

/* Model Breakdown */
.model-grid {
  padding: 0 16px 10px;
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 4px;
}

.model-pill {
  background: var(--bg-surface);
  border-radius: 3px;
  padding: 5px 6px;
  text-align: center;
  font-size: 0.65rem;
  position: relative;
  border: 1px solid var(--border);
}

.model-pill.ai {
  border-color: rgba(167, 139, 250, 0.4);
  background: rgba(167, 139, 250, 0.05);
}

.model-pill-name {
  color: var(--text-dim);
  font-size: 0.6rem;
  text-transform: uppercase;
  letter-spacing: 0.04em;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.model-pill.ai .model-pill-name { color: var(--purple); }

.model-pill-temp {
  color: var(--text-bright);
  font-weight: 600;
  font-size: 0.85rem;
}

.model-pill-std {
  color: var(--text-dim);
  font-size: 0.6rem;
}

/* NWS Strip */
.nws-strip {
  padding: 6px 16px;
  background: var(--bg-surface);
  display: flex;
  gap: 14px;
  font-size: 0.75rem;
  border-top: 1px solid var(--border);
  border-bottom: 1px solid var(--border);
  flex-wrap: wrap;
}

.nws-item { display: flex; gap: 4px; }
.nws-item-label { color: var(--text-dim); }
.nws-item-value { color: var(--text); font-weight: 500; }
.nws-item-value.hot { color: var(--red); }
.nws-item-value.cold { color: var(--cyan); }
.nws-item-value.ok { color: var(--green); }
.nws-item-value.diverge { color: var(--amber); }

/* Bracket Table */
.bracket-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 0.75rem;
}

.bracket-table th {
  padding: 6px 10px;
  text-align: right;
  font-weight: 500;
  color: var(--text-dim);
  text-transform: uppercase;
  font-size: 0.6rem;
  letter-spacing: 0.08em;
  border-bottom: 1px solid var(--border);
}

.bracket-table th:first-child { text-align: left; }

.bracket-table td {
  padding: 5px 10px;
  text-align: right;
  border-bottom: 1px solid rgba(30,35,48,0.5);
  font-variant-numeric: tabular-nums;
}

.bracket-table td:first-child { text-align: left; color: var(--text-dim); }

.bracket-table tr:hover { background: var(--bg-card-hover); }

.bid-cell { color: var(--text); }
.edge-cell.positive { color: var(--green); }
.edge-cell.negative { color: var(--red-dim); }
.kde-cell { color: var(--cyan); }
.vol-cell { color: var(--text-dim); font-size: 0.7rem; }

/* KDE Bar (inline) */
.kde-bar {
  display: inline-block;
  height: 3px;
  background: var(--cyan);
  border-radius: 1px;
  margin-right: 6px;
  vertical-align: middle;
  opacity: 0.6;
}

/* Opportunity Rows */
.opp-section {
  padding: 8px 16px;
  border-top: 1px solid var(--border);
}

.opp-section-title {
  font-size: 0.65rem;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: var(--text-dim);
  margin-bottom: 6px;
}

.opp-row {
  padding: 6px 0;
  border-bottom: 1px solid rgba(30,35,48,0.4);
  display: grid;
  grid-template-columns: 60px 1fr auto;
  gap: 10px;
  align-items: center;
}

.opp-side {
  font-weight: 700;
  font-size: 0.75rem;
  text-transform: uppercase;
  padding: 2px 8px;
  border-radius: 2px;
  text-align: center;
  width: fit-content;
}

.opp-side.yes { background: rgba(34,197,94,0.12); color: var(--green); border: 1px solid rgba(34,197,94,0.3); }
.opp-side.no { background: rgba(239,68,68,0.1); color: var(--red); border: 1px solid rgba(239,68,68,0.2); }

.opp-detail {
  display: flex;
  flex-direction: column;
  gap: 1px;
}

.opp-bracket { color: var(--text); font-weight: 500; font-size: 0.8rem; }
.opp-ticker { color: var(--text-dim); font-size: 0.65rem; }

.opp-stats {
  display: flex;
  gap: 12px;
  font-size: 0.75rem;
  align-items: center;
}

.opp-edge { color: var(--green); font-weight: 600; }
.opp-kde { color: var(--cyan); }
.opp-ts { font-weight: 600; }
.opp-ts.hot { color: var(--amber); }
.opp-ts.warm { color: var(--cyan); }
.opp-ts.cold { color: var(--text-dim); }

/* Strategies */
.strat-tags {
  display: flex;
  gap: 4px;
  flex-wrap: wrap;
  padding: 4px 16px 10px;
}

.strat-tag {
  font-size: 0.6rem;
  padding: 2px 6px;
  border-radius: 2px;
  background: var(--bg-surface);
  color: var(--text-dim);
  border: 1px solid var(--border);
  letter-spacing: 0.02em;
}

.strat-tag.wind { border-color: rgba(96,165,250,0.3); color: var(--blue); }
.strat-tag.diverge { border-color: rgba(245,158,11,0.3); color: var(--amber); }
.strat-tag.midnight { border-color: rgba(167,139,250,0.3); color: var(--purple); }
.strat-tag.trend { border-color: rgba(34,197,94,0.3); color: var(--green); }
.strat-tag.wet { border-color: rgba(34,211,238,0.3); color: var(--cyan); }

/* ─── OPPORTUNITY TABLE (bottom) ─── */
.bottom-section {
  border-top: 2px solid var(--border);
  padding: 16px 24px 32px;
}

.section-title {
  font-family: var(--sans);
  font-weight: 700;
  font-size: 0.9rem;
  color: var(--text-bright);
  letter-spacing: 0.05em;
  text-transform: uppercase;
  margin-bottom: 12px;
  display: flex;
  align-items: center;
  gap: 8px;
}

.section-title .count {
  background: var(--bg-surface);
  padding: 2px 8px;
  border-radius: 3px;
  font-family: var(--mono);
  font-size: 0.75rem;
  color: var(--text-dim);
}

.opp-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 0.8rem;
}

.opp-table thead th {
  padding: 8px 12px;
  text-align: right;
  font-weight: 500;
  color: var(--text-dim);
  text-transform: uppercase;
  font-size: 0.65rem;
  letter-spacing: 0.08em;
  border-bottom: 2px solid var(--border);
  position: sticky;
  top: 0;
  background: var(--bg);
}

.opp-table thead th:first-child,
.opp-table thead th:nth-child(2),
.opp-table thead th:nth-child(3) { text-align: left; }

.opp-table tbody td {
  padding: 8px 12px;
  text-align: right;
  border-bottom: 1px solid var(--border);
  font-variant-numeric: tabular-nums;
}

.opp-table tbody td:first-child,
.opp-table tbody td:nth-child(2),
.opp-table tbody td:nth-child(3) { text-align: left; }

.opp-table tbody tr { transition: background 0.15s; }
.opp-table tbody tr:hover { background: var(--bg-card-hover); }

.rank-num {
  display: inline-flex;
  width: 22px;
  height: 22px;
  align-items: center;
  justify-content: center;
  border-radius: 3px;
  font-weight: 600;
  font-size: 0.7rem;
}

.rank-num.top { background: rgba(245,158,11,0.15); color: var(--amber); }
.rank-num.normal { background: var(--bg-surface); color: var(--text-dim); }

.ts-bar-wrap {
  display: flex;
  align-items: center;
  gap: 6px;
  justify-content: flex-end;
}

.ts-bar {
  width: 50px;
  height: 4px;
  background: var(--border);
  border-radius: 2px;
  overflow: hidden;
}

.ts-bar-fill {
  height: 100%;
  border-radius: 2px;
  transition: width 0.8s ease;
}

.ts-bar-fill.hot { background: var(--amber); }
.ts-bar-fill.warm { background: var(--cyan); }
.ts-bar-fill.cold { background: var(--text-dim); }

/* Footer */
.footer {
  padding: 12px 24px;
  border-top: 1px solid var(--border);
  display: flex;
  justify-content: space-between;
  font-size: 0.7rem;
  color: var(--text-dim);
  background: var(--bg-card);
}

/* Loading */
.loading {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: 100vh;
  gap: 16px;
}

.loading-spinner {
  width: 32px;
  height: 32px;
  border: 2px solid var(--border);
  border-top-color: var(--amber);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}

@keyframes spin { to { transform: rotate(360deg); } }

.loading-text { color: var(--text-dim); font-size: 0.85rem; }

/* Animations */
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(6px); }
  to { opacity: 1; transform: translateY(0); }
}

.animate-in {
  animation: fadeIn 0.4s ease forwards;
  opacity: 0;
}

/* scrollbar */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--border-active); border-radius: 3px; }

/* ─── LIVE BOT PANELS ─── */
.status-banner{display:flex;justify-content:space-between;align-items:center;padding:10px 24px;border-bottom:1px solid var(--border);background:linear-gradient(180deg,rgba(34,197,94,0.04),transparent);font-size:0.8rem;flex-wrap:wrap;gap:8px;}
.sb-left{display:flex;align-items:center;gap:16px;flex-wrap:wrap;}
.sb-right{display:flex;align-items:center;gap:16px;color:var(--text-dim);}
.mode-pill{background:rgba(245,158,11,0.15);color:var(--amber);border:1px solid var(--amber-dim);padding:2px 10px;border-radius:3px;font-weight:700;letter-spacing:0.08em;font-size:0.7rem;}
.live-ind{display:flex;align-items:center;gap:7px;font-weight:600;letter-spacing:0.06em;color:var(--text-bright);}
.live-dot{width:8px;height:8px;border-radius:50%;}
.live-dot.on{background:var(--green);box-shadow:0 0 8px var(--green);animation:pulse 2s ease-in-out infinite;}
.live-dot.off{background:var(--red);box-shadow:0 0 8px var(--red);}
.sb-meta{color:var(--text-dim);}
#conn.ok{color:var(--green);} #conn.bad{color:var(--red);}

.vitals-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:1px;background:var(--bg);border-bottom:1px solid var(--border);}
.vital-card{background:var(--bg-card);padding:14px 18px;text-align:center;}
.vital-num{font-size:1.5rem;font-weight:700;color:var(--text-bright);line-height:1;}
.vital-num.success{color:var(--green);} .vital-num.danger{color:var(--red);} .vital-num.highlight{color:var(--amber);}
.vital-label{font-size:0.68rem;color:var(--text-dim);text-transform:uppercase;letter-spacing:0.1em;margin-top:6px;}

/* KPI feed — four grouped cards */
.kpi-feed{display:grid;grid-template-columns:repeat(auto-fit,minmax(248px,1fr));gap:1px;background:var(--bg);border-bottom:1px solid var(--border);}
.kpi-group{background:var(--bg-card);padding:13px 18px;}
.kpi-gtitle{font-family:var(--sans);font-weight:700;font-size:0.68rem;color:var(--text-dim);text-transform:uppercase;letter-spacing:0.12em;margin-bottom:11px;}
.kpi-cells{display:grid;grid-template-columns:repeat(3,1fr);gap:11px 10px;}
.kpi-cell{text-align:left;min-width:0;}
.kpi-val{font-size:1.04rem;font-weight:700;color:var(--text-bright);line-height:1.15;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.kpi-val.success{color:var(--green);} .kpi-val.danger{color:var(--red);} .kpi-val.highlight{color:var(--amber);} .kpi-val.warn{color:var(--amber);}
.kpi-sub{font-size:0.7rem;font-weight:600;opacity:0.75;}
.kpi-off{font-size:0.76rem;color:var(--text-dim);font-weight:500;}
.kpi-lab{font-size:0.6rem;color:var(--text-dim);text-transform:uppercase;letter-spacing:0.08em;margin-top:4px;}

.live-section{padding:14px 24px;border-bottom:1px solid var(--border);}
.ls-title{font-family:var(--sans);font-weight:700;font-size:0.82rem;color:var(--text-bright);letter-spacing:0.05em;text-transform:uppercase;margin-bottom:10px;display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.ls-title .count{background:var(--bg-surface);padding:2px 8px;border-radius:3px;font-family:var(--mono);font-size:0.72rem;color:var(--text-dim);}
.oc-pill{background:var(--bg-surface);border:1px solid var(--border);padding:1px 7px;border-radius:3px;font-size:0.65rem;color:var(--text-dim);font-weight:400;letter-spacing:0;}

.live-table{width:100%;border-collapse:collapse;font-size:0.78rem;}
.live-table th{padding:6px 10px;text-align:right;font-weight:500;color:var(--text-dim);text-transform:uppercase;font-size:0.62rem;letter-spacing:0.07em;border-bottom:1px solid var(--border);}
.live-table th:first-child,.live-table th:last-child{text-align:left;}
.live-table td{padding:6px 10px;text-align:right;border-bottom:1px solid rgba(30,35,48,0.5);font-variant-numeric:tabular-nums;}
.live-table td:first-child,.live-table td:last-child{text-align:left;}
.live-table tr:hover{background:var(--bg-card-hover);}
.mono-cell{color:var(--text);font-size:0.72rem;}
.note-cell{color:var(--text-dim);font-size:0.68rem;max-width:360px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.dim{color:var(--text-dim);}
.live-table td.pos{color:var(--green);} .live-table td.neg{color:var(--red);}
.side-pill{font-weight:700;font-size:0.62rem;padding:1px 6px;border-radius:2px;}
.side-pill.yes{background:rgba(34,197,94,0.12);color:var(--green);border:1px solid rgba(34,197,94,0.3);}
.side-pill.no{background:rgba(239,68,68,0.1);color:var(--red);border:1px solid rgba(239,68,68,0.2);}
.flag{font-size:0.6rem;padding:1px 5px;border-radius:2px;background:rgba(167,139,250,0.12);color:var(--purple);border:1px solid rgba(167,139,250,0.3);}
.ostatus{font-size:0.62rem;padding:1px 6px;border-radius:2px;text-transform:uppercase;letter-spacing:0.04em;}
.ostatus.resting{background:rgba(34,211,238,0.1);color:var(--cyan);border:1px solid rgba(34,211,238,0.25);}
.ostatus.canceled,.ostatus.cancelled{background:rgba(107,114,128,0.1);color:var(--text-dim);border:1px solid var(--border);}
.ostatus.filled{background:rgba(34,197,94,0.12);color:var(--green);border:1px solid rgba(34,197,94,0.3);}

.health-strip{display:flex;gap:8px;flex-wrap:wrap;}
.health-pill{display:flex;flex-direction:column;gap:2px;padding:6px 12px;border-radius:4px;background:var(--bg-surface);border:1px solid var(--border);border-left-width:3px;}
.health-pill.ok{border-left-color:var(--green);}
.health-pill.warm{border-left-color:var(--cyan);}
.health-pill.hot{border-left-color:var(--red);}
.health-pill.neutral{border-left-color:var(--border-active);}
.hp-name{font-size:0.68rem;color:var(--text);font-weight:500;}
.hp-age{font-size:0.62rem;color:var(--text-dim);}

.scan-notice{padding:40px 24px;text-align:center;}
.sn-title{font-family:var(--sans);font-weight:700;color:var(--text-bright);font-size:0.95rem;letter-spacing:0.05em;text-transform:uppercase;}
.sn-sub{color:var(--text-dim);font-size:0.8rem;margin-top:8px;max-width:640px;margin-left:auto;margin-right:auto;line-height:1.5;}
.sn-sub code{color:var(--amber);background:var(--bg-surface);padding:1px 6px;border-radius:3px;}

/* ─── LIVE PRICE CHART ─── */
.price-head{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;margin-bottom:10px;}
.price-tabs{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:10px;}
.price-tab{padding:3px 13px;border-radius:3px;font-family:var(--mono);font-size:0.72rem;font-weight:600;letter-spacing:0.04em;background:var(--bg-surface);border:1px solid var(--border);color:var(--text-dim);cursor:pointer;transition:all 0.15s;}
.price-tab:hover{color:var(--text);border-color:var(--border-active);}
.price-tab.active{background:rgba(245,158,11,0.12);border-color:var(--amber-dim);color:var(--amber);}
.price-chart{width:100%;height:auto;display:block;background:var(--bg-card);border:1px solid var(--border);border-radius:4px;}
.price-grid-line{stroke:var(--border);stroke-width:1;}
.price-axis-label{fill:var(--text-dim);font-family:var(--mono);font-size:11px;}
.price-line{fill:none;stroke-width:2;vector-effect:non-scaling-stroke;}
.price-dot{stroke:var(--bg-card);stroke-width:1.5;}
.price-legend{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px;}
.pl-item{display:flex;align-items:center;gap:7px;padding:4px 9px;border-radius:4px;background:var(--bg-surface);border:1px solid var(--border);font-size:0.7rem;}
.pl-swatch{width:10px;height:10px;border-radius:2px;flex-shrink:0;}
.pl-label{color:var(--text);font-weight:500;}
.pl-mid{color:var(--text-bright);font-weight:700;font-variant-numeric:tabular-nums;}
.pl-sub{color:var(--text-dim);}
.price-empty{padding:30px;text-align:center;color:var(--text-dim);font-size:0.82rem;}
/* temperature chart */
.temp-line{fill:none;stroke:var(--amber);stroke-width:2.2;vector-effect:non-scaling-stroke;}
.temp-dot{fill:var(--amber);stroke:var(--bg-card);stroke-width:1.5;}
.temp-cur-lab{fill:var(--amber);font-family:var(--mono);font-size:12px;font-weight:700;}
.temp-brk{stroke:var(--text-dim);stroke-width:1;stroke-dasharray:3 4;opacity:0.4;vector-effect:non-scaling-stroke;}
.temp-brk.held{stroke:var(--cyan);stroke-dasharray:none;opacity:0.85;stroke-width:1.4;}
.temp-brk-lab{fill:var(--text-dim);font-family:var(--mono);font-size:10px;opacity:0.7;}
.temp-brk-lab.held{fill:var(--cyan);opacity:1;font-weight:600;}
.temp-peak{stroke:var(--red);stroke-width:1.2;stroke-dasharray:6 3;opacity:0.7;vector-effect:non-scaling-stroke;}
.temp-peak-lab{fill:var(--red);font-family:var(--mono);font-size:10.5px;font-weight:600;}

.rd-row{display:flex;align-items:flex-start;gap:12px;margin:10px 0;}
.rd-city{min-width:170px;line-height:1.5;}
.rd-city b{font-size:13px;letter-spacing:.5px;}
.rd-city span{display:block;color:var(--text-dim);font-family:var(--mono);font-size:11px;}
.rd-strip{display:flex;flex-wrap:wrap;gap:6px;flex:1;}
.rd-chip{border:1px solid var(--border);border-radius:6px;padding:4px 9px;text-align:center;}
.rd-dead{opacity:.35;}
.rd-leader{border-color:var(--cyan);}
.rd-target{border-color:var(--amber);}
.rd-alert{opacity:1;border-color:var(--red);animation:rd-pulse 1.2s ease-in-out infinite alternate;}
@keyframes rd-pulse{from{box-shadow:0 0 2px var(--red);}to{box-shadow:0 0 10px var(--red);}}
.rd-tag{color:var(--red);font-weight:700;font-size:10px;letter-spacing:.5px;}
.rd-lab{font-size:11px;color:var(--text-dim);white-space:nowrap;}
.rd-px{font-family:var(--mono);font-size:12px;}
.rd-alert-badge{background:var(--red);color:#fff;border-radius:10px;padding:1px 9px;font-size:11px;font-weight:700;margin-left:8px;vertical-align:2px;}

.liveacct{border:1.5px solid var(--cyan);border-radius:10px;padding:14px 16px;margin:8px 0 18px;background:rgba(34,211,238,0.04);}
.liveacct-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.liveacct-title{font-size:13px;font-weight:700;letter-spacing:.5px;color:var(--cyan);}
.liveacct-title .real{background:var(--cyan);color:#04222a;border-radius:9px;padding:1px 8px;font-size:10px;margin-left:8px;vertical-align:1px;}
.liveacct-cells{display:flex;flex-wrap:wrap;gap:20px;}
.la-cell{min-width:70px;}
.la-val{font-family:var(--mono);font-size:20px;font-weight:700;}
.la-lab{font-size:11px;color:var(--text-dim);text-transform:uppercase;letter-spacing:.5px;}
.la-pos{color:var(--green,#22c55e);} .la-neg{color:var(--red);}
.la-table{width:100%;border-collapse:collapse;margin-top:10px;font-size:12px;}
.la-table th{text-align:left;color:var(--text-dim);font-weight:500;padding:3px 8px;font-size:10px;text-transform:uppercase;}
.la-table td{padding:3px 8px;border-top:1px solid var(--border);font-family:var(--mono);}
.paper-tag{font-size:10px;color:var(--text-dim);background:var(--border);border-radius:8px;padding:1px 8px;margin-left:8px;letter-spacing:.5px;}
</style>
</head>
<body>

<div id="liveacct"></div>
<div id="live">
  <div class="loading">
    <div class="loading-spinner"></div>
    <div class="loading-text">Connecting to bot…</div>
  </div>
</div>
<div id="prices"></div>
<div id="temps"></div>
<div id="radar"></div>
<div id="walls"></div>

<script>

// ─── LIVE POLLING ───────────────────────────────────────────────────────────
const REFRESH_MS = 15000;

function esc(s){ return String(s==null?'':s).replace(/[&<>]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[c])); }
function fmtMoney(n){ const v = Number(n||0); return (v<0?'-$':'$') + Math.abs(v).toFixed(2); }
function fmtAge(s){
  if (s==null) return '—';
  s = Math.max(0, Math.round(s));
  if (s < 60) return s + 's';
  if (s < 3600) return Math.floor(s/60) + 'm';
  if (s < 86400) return Math.floor(s/3600) + 'h ' + Math.floor((s%3600)/60) + 'm';
  return Math.floor(s/86400) + 'd';
}
function ageClass(s, warn, bad){ if (s==null) return 'hot'; if (s<warn) return 'ok'; if (s<bad) return 'warm'; return 'hot'; }
function kpiCell(label, val, cls){
  return `<div class="kpi-cell"><div class="kpi-val ${cls||''}">${val}</div><div class="kpi-lab">${label}</div></div>`;
}
function kpiGroup(title, cells){
  return `<div class="kpi-group"><div class="kpi-gtitle">${title}</div><div class="kpi-cells">${cells.join('')}</div></div>`;
}

function renderHealthKpis(state){
  const k = state.kpis;
  if (!k) return '';
  const hl = k.health;
  const mon = ageClass(hl.cli_sniper_age_seconds, 360, 720);
  const monCls = mon==='ok'?'success':(mon==='warm'?'warn':'danger');
  const pricesTxt = hl.prices_enabled ? (hl.prices_ok===false?'error':(hl.prices_ok?'live':'…')) : 'off';
  const pricesCls = hl.prices_enabled ? (hl.prices_ok?'success':(hl.prices_ok===false?'danger':'')) : '';
  const nErr = (hl.errors&&hl.errors.length)||0;
  return `<div class="kpi-feed">${kpiGroup('Bot Health', [
    kpiCell('Status', hl.alive?'LIVE':'STALLED', hl.alive?'success':'danger'),
    kpiCell('Sniper', fmtAge(hl.cli_sniper_age_seconds), monCls),
    kpiCell('Prices', pricesTxt, pricesCls),
    kpiCell('Errors', nErr, nErr?'danger':'success'),
  ])}</div>`;
}

function renderLive(state){
  const live = state.liveness;

  let h = '';

  // Status banner
  h += `<div class="status-banner">
    <div class="sb-left">
      <span class="mode-pill">${esc(state.mode)}</span>
      <span class="live-ind"><span class="live-dot ${live.alive?'on':'off'}"></span>${live.alive?'LIVE':'STALLED'}</span>
      <span class="sb-meta">cli_sniper ${fmtAge(live.cli_sniper_age_seconds)} ago</span>
    </div>
    <div class="sb-right">
      <span class="sb-meta" id="conn">●</span>
      <span class="sb-meta">updated ${new Date(state.server_time).toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit',second:'2-digit'})}</span>
    </div>
  </div>`;

  // Bot health only — real money is the panel above (the KDE paper stack
  // was deleted 2026-07-06, measured -EV).
  h += renderHealthKpis(state);

  // Service heartbeats
  h += `<div class="live-section"><div class="ls-title">Service Heartbeats</div><div class="health-strip">`;
  for (const [svc, hb] of Object.entries(state.heartbeats||{})){
    if (svc.startsWith('_')) continue;
    const a = hb.age_seconds;
    const cls = (svc === 'cli_sniper') ? ageClass(a, 360, 720) : 'neutral';
    h += `<div class="health-pill ${cls}"><span class="hp-name">${esc(svc)}</span><span class="hp-age">${fmtAge(a)} ago</span></div>`;
  }
  h += `</div></div>`;

  // Peak monitor
  const pk = Object.values(state.peaks||{});
  if (pk.length){
    h += `<div class="live-section"><div class="ls-title">Peak Monitor <span class="count">${pk[0].date||''}</span></div><div class="health-strip">`;
    for (const c of pk){
      h += `<div class="health-pill ${c.peak_confirmed?'ok':'warm'}">
        <span class="hp-name">${esc(c.city_key)} ${c.peak_confirmed?'✓':'…'}</span>
        <span class="hp-age">${esc(c.running_max)}° · ${esc(c.peak_bracket)}</span>
      </div>`;
    }
    h += `</div></div>`;
  }

  document.getElementById('live').innerHTML = h;
}

// ─── LIVE PRICE CHART ───────────────────────────────────────────────────────
const PRICE_COLORS = ['#22d3ee','#f59e0b','#22c55e','#a78bfa','#60a5fa','#ef4444','#ec4899','#14b8a6'];
let priceCity = null;
let lastPrices = null;
let lastTemps = null;

function fmtClock(t){ return new Date(t).toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit',hour12:false}); }
function fmtVol(v){ v = Number(v||0); return v>=1000 ? (v/1000).toFixed(1)+'k' : String(Math.round(v)); }
function selectPriceCity(city){ priceCity = city; if (lastPrices) renderPrices(lastPrices); if (lastTemps) renderTemps(lastTemps); }
window.selectPriceCity = selectPriceCity;

function renderPriceChart(contracts){
  const W=1000, H=340, mL=46, mR=14, mT=14, mB=28;
  const plotW=W-mL-mR, plotH=H-mT-mB;

  let tmin=Infinity, tmax=-Infinity, ymin=Infinity, ymax=-Infinity;
  const series = contracts.map((c,i) => {
    const pts = (c.points||[]).map(p => ({t:new Date(p.t).getTime(), v:p.mid}))
                              .filter(p => isFinite(p.t) && p.v!=null);
    for (const p of pts){ if(p.t<tmin)tmin=p.t; if(p.t>tmax)tmax=p.t; if(p.v<ymin)ymin=p.v; if(p.v>ymax)ymax=p.v; }
    return { c, pts, color: PRICE_COLORS[i % PRICE_COLORS.length] };
  });
  if (!isFinite(tmin)) return `<div class="price-empty">No price points yet — first sample lands within one poll interval.</div>`;
  if (tmin===tmax){ tmin-=60000; tmax+=60000; }
  if (!isFinite(ymin)){ ymin=0; ymax=100; }
  const pad = Math.max(1,(ymax-ymin)*0.12);
  ymin = Math.max(0, Math.floor(ymin-pad));
  ymax = Math.min(100, Math.ceil(ymax+pad));
  if (ymax-ymin < 4) ymax = Math.min(100, ymin+4);

  const X = t => mL + ((t-tmin)/(tmax-tmin))*plotW;
  const Y = v => mT + (1-((v-ymin)/(ymax-ymin)))*plotH;

  let grid='';
  const yt=4;
  for (let i=0;i<=yt;i++){
    const v=ymin+(ymax-ymin)*i/yt, y=Y(v);
    grid += `<line class="price-grid-line" x1="${mL}" y1="${y.toFixed(1)}" x2="${W-mR}" y2="${y.toFixed(1)}"/>`;
    grid += `<text class="price-axis-label" x="${mL-6}" y="${(y+3.5).toFixed(1)}" text-anchor="end">${Math.round(v)}¢</text>`;
  }
  const xt=5;
  for (let i=0;i<=xt;i++){
    const t=tmin+(tmax-tmin)*i/xt, x=X(t);
    grid += `<text class="price-axis-label" x="${x.toFixed(1)}" y="${H-8}" text-anchor="middle">${fmtClock(t)}</text>`;
  }

  let lines='';
  for (const s of series){
    if (!s.pts.length) continue;
    const last=s.pts[s.pts.length-1];
    if (s.pts.length>1){
      const d=s.pts.map(p => `${X(p.t).toFixed(1)},${Y(p.v).toFixed(1)}`).join(' ');
      lines += `<polyline class="price-line" points="${d}" stroke="${s.color}"/>`;
    }
    lines += `<circle class="price-dot" cx="${X(last.t).toFixed(1)}" cy="${Y(last.v).toFixed(1)}" r="3" fill="${s.color}"/>`;
  }

  const svg = `<svg class="price-chart" viewBox="0 0 ${W} ${H}" role="img" aria-label="Contract prices over time">${grid}${lines}</svg>`;

  let legend='<div class="price-legend">';
  for (const s of series){
    const c=s.c;
    const ba = (c.bid!=null && c.ask!=null) ? `${c.bid}/${c.ask}¢` : '';
    legend += `<div class="pl-item">
      <span class="pl-swatch" style="background:${s.color}"></span>
      <span class="pl-label">${esc(c.label||c.ticker)}${c.date?` <span class="pl-sub">${esc(c.date)}</span>`:''}${c.held?' ◆':''}${c.watched?' 👁':''}</span>
      <span class="pl-mid">${c.mid!=null?Math.round(c.mid)+'¢':'—'}</span>
      <span class="pl-sub">${ba}</span>
      <span class="pl-sub">vol ${fmtVol(c.volume)}</span>
    </div>`;
  }
  legend += '</div>';
  return svg + legend;
}

function renderPrices(data){
  lastPrices = data;
  const el = document.getElementById('prices');
  if (!el) return;
  const all = (data && data.contracts) || [];

  if (data && data.enabled === false){
    el.innerHTML = `<div class="live-section"><div class="ls-title">Live Contract Prices</div>
      <div class="price-empty">Live pricing is off — set <code>DASHBOARD_PRICES=1</code> and restart the server.</div></div>`;
    return;
  }

  const ageTxt = data.updated ? fmtAge((Date.now()-new Date(data.updated).getTime())/1000)+' ago' : 'never';
  const status = (data.last_poll_ok===false)
    ? `<span style="color:var(--red)">poll error</span> · every ${data.poll_seconds}s`
    : `updated ${ageTxt} · every ${data.poll_seconds}s`;

  let h = `<div class="live-section">
    <div class="price-head">
      <div class="ls-title" style="margin:0">Live Contract Prices <span class="count">${all.length}</span></div>
      <div class="sb-meta">${status}</div>
    </div>`;

  if (!all.length){
    h += `<div class="price-empty">Capturing first prices from Kalshi… (polls every ${data.poll_seconds||60}s)</div></div>`;
    el.innerHTML = h; return;
  }

  const cities = [...new Set(all.map(c => c.city))];
  if (!priceCity || !cities.includes(priceCity)){
    const vol = {};
    all.forEach(c => { vol[c.city] = (vol[c.city]||0) + (c.volume||0); });
    priceCity = cities.slice().sort((a,b) => (vol[b]||0)-(vol[a]||0))[0] || null;
  }

  h += `<div class="price-tabs">`;
  for (const c of cities){
    // data-city + delegated listener (below) — never interpolate a value into
    // an inline onclick/attribute, even from a trusted source.
    h += `<button class="price-tab ${c===priceCity?'active':''}" data-city="${esc(c)}">${esc(c)}</button>`;
  }
  h += `</div>`;

  let vis = all.filter(c => c.city===priceCity && c.points && c.points.length);
  // Held/watched contracts pin to the top so the volume cut never drops them.
  const pin = c => (c.held?2:0) + (c.watched?1:0);
  vis.sort((a,b) => (pin(b)-pin(a)) || (b.volume||0)-(a.volume||0));
  vis = vis.slice(0, 8);

  h += renderPriceChart(vis);
  h += `</div>`;
  el.innerHTML = h;
  if (!el._cityHandlerBound){
    el.addEventListener('click', (e) => {
      const btn = e.target.closest('.price-tab[data-city]');
      if (btn) selectPriceCity(btn.dataset.city);
    });
    el._cityHandlerBound = true;
  }
}

// ─── LIVE TEMPERATURE CHART (paired with the price chart, same city tab) ─────
function renderTempChart(city, rec){
  const W=1000, H=300, mL=42, mR=120, mT=14, mB=28;
  const plotW=W-mL-mR, plotH=H-mT-mB;
  const series = (rec.series||[]).map(p => ({t:new Date(p.t).getTime(), v:Number(p.temp)}))
                                 .filter(p => isFinite(p.t) && isFinite(p.v));
  if (series.length < 1) return `<div class="price-empty">No observations yet for ${esc(city)} — IEM/NWS poll lands within ${rec._poll||5} min.</div>`;

  const brackets = (rec.brackets||[]);
  let tmin=Infinity,tmax=-Infinity,ymin=Infinity,ymax=-Infinity;
  for (const p of series){ if(p.t<tmin)tmin=p.t; if(p.t>tmax)tmax=p.t; if(p.v<ymin)ymin=p.v; if(p.v>ymax)ymax=p.v; }
  // include bracket lines + running max in the y-range so they're visible
  // Scale the axis to the observed curve, the peak, and only OUR held brackets —
  // watched bracket lines clip to the window (below) instead of stretching it.
  const extra = [];
  for (const b of brackets){ if(b.held){ if(b.lo!=null)extra.push(b.lo); if(b.hi!=null)extra.push(b.hi); } }
  if (rec.running_max!=null && rec.running_max>-100) extra.push(rec.running_max);
  for (const v of extra){ if(v<ymin)ymin=v; if(v>ymax)ymax=v; }
  if (tmin===tmax){ tmin-=1800000; tmax+=1800000; }
  if (!isFinite(ymin)){ ymin=30; ymax=90; }
  const pad=Math.max(1,(ymax-ymin)*0.12); ymin=Math.floor(ymin-pad); ymax=Math.ceil(ymax+pad);
  if (ymax-ymin<4) ymax=ymin+4;

  const X=t=>mL+((t-tmin)/(tmax-tmin||1))*plotW;
  const Y=v=>mT+(1-((v-ymin)/(ymax-ymin)))*plotH;

  let grid='';
  for (let i=0;i<=4;i++){ const v=ymin+(ymax-ymin)*i/4, y=Y(v);
    grid+=`<line class="price-grid-line" x1="${mL}" y1="${y.toFixed(1)}" x2="${W-mR}" y2="${y.toFixed(1)}"/>`;
    grid+=`<text class="price-axis-label" x="${mL-6}" y="${(y+3.5).toFixed(1)}" text-anchor="end">${Math.round(v)}°</text>`;
  }
  for (let i=0;i<=5;i++){ const t=tmin+(tmax-tmin)*i/5, x=X(t);
    grid+=`<text class="price-axis-label" x="${x.toFixed(1)}" y="${H-8}" text-anchor="middle">${fmtClock(t)}</text>`;
  }

  // bracket threshold lines (held = bright/solid, watched = faint/dashed)
  let blines='';
  for (const b of brackets){
    for (const edge of [b.lo,b.hi]){
      if (edge==null) continue;
      const y=Y(edge); if (y<mT-1||y>mT+plotH+1) continue;
      const cls = b.held ? 'temp-brk held' : 'temp-brk';
      blines+=`<line class="${cls}" x1="${mL}" y1="${y.toFixed(1)}" x2="${W-mR}" y2="${y.toFixed(1)}"/>`;
      blines+=`<text class="temp-brk-lab ${b.held?'held':''}" x="${W-mR+5}" y="${(y+3.5).toFixed(1)}">${esc(b.label)}${b.held?' ◆':''}</text>`;
    }
  }

  // running daily max line + marker
  let peak='';
  if (rec.running_max!=null && rec.running_max>-100){
    const y=Y(rec.running_max);
    peak+=`<line class="temp-peak" x1="${mL}" y1="${y.toFixed(1)}" x2="${W-mR}" y2="${y.toFixed(1)}"/>`;
    peak+=`<text class="temp-peak-lab" x="${mL+4}" y="${(y-4).toFixed(1)}">peak ${rec.running_max}°${rec.peak_confirmed?' ✓':' …'}</text>`;
  }

  const d=series.map(p=>`${X(p.t).toFixed(1)},${Y(p.v).toFixed(1)}`).join(' ');
  const line = series.length>1 ? `<polyline class="temp-line" points="${d}"/>` : '';
  const last=series[series.length-1];
  const dot=`<circle class="temp-dot" cx="${X(last.t).toFixed(1)}" cy="${Y(last.v).toFixed(1)}" r="3.5"/>`;
  const lastLab=`<text class="temp-cur-lab" x="${(X(last.t)+7).toFixed(1)}" y="${(Y(last.v)+3.5).toFixed(1)}">${last.v.toFixed(1)}°</text>`;

  return `<svg class="price-chart" viewBox="0 0 ${W} ${H}" role="img" aria-label="Observed temperature over time for ${esc(city)}">${grid}${blines}${peak}${line}${dot}${lastLab}</svg>`;
}

function renderTemps(data){
  lastTemps = data;
  const el = document.getElementById('temps');
  if (!el) return;
  if (data && data.enabled === false){ el.innerHTML=''; return; }
  const cities = (data && data.cities) || {};
  const keys = Object.keys(cities);
  // follow the price chart's selected city; fall back to first available
  let city = priceCity;
  if (!city || !cities[city]) city = keys[0] || null;
  if (!city){
    el.innerHTML = `<div class="live-section"><div class="ls-title">Live Temperature</div>
      <div class="price-empty">Capturing observations… (IEM ASOS / NWS, every ${Math.round((data.poll_seconds||300)/60)} min)</div></div>`;
    return;
  }
  const rec = cities[city];
  rec._poll = Math.round((data.poll_seconds||300)/60);
  const ageTxt = data.updated ? fmtAge((Date.now()-new Date(data.updated).getTime())/1000)+' ago' : 'never';
  const status = (data.last_poll_ok===false) ? `<span style="color:var(--red)">poll error</span>` : `updated ${ageTxt}`;
  const cur = rec.current!=null ? `${rec.current.toFixed(1)}°` : '—';
  const hi = rec.high!=null ? `${rec.high.toFixed(1)}°` : '—';
  el.innerHTML = `<div class="live-section">
    <div class="price-head">
      <div class="ls-title" style="margin:0">Live Temperature — ${esc(city)} <span class="count">now ${cur} · today's high ${hi}</span></div>
      <div class="sb-meta">${status} · every ${Math.round((data.poll_seconds||300)/60)}min</div>
    </div>
    ${renderTempChart(city, rec)}
  </div>`;
}

function renderLiveAccount(data){
  const el = document.getElementById('liveacct');
  if (!el) return;
  if (!data || !data.available){ el.innerHTML=''; return; }
  const money = n => (n==null?'—':(n<0?'-$':'$')+Math.abs(n).toFixed(2));
  const cls = n => n==null?'':(n>0?'la-pos':(n<0?'la-neg':''));
  const ageTxt = data.age_seconds!=null ? fmtAge(data.age_seconds)+' ago' : 'never';

  let h = `<div class="liveacct">
    <div class="liveacct-head">
      <div class="liveacct-title">Live account <span class="real">REAL MONEY</span></div>
      <div class="sb-meta">Kalshi · updated ${ageTxt}</div>
    </div>
    <div class="liveacct-cells">
      <div class="la-cell"><div class="la-val">${money(data.balance)}</div><div class="la-lab">Cash balance</div></div>
      <div class="la-cell"><div class="la-val ${cls(data.realized_total)}">${money(data.realized_total)}</div><div class="la-lab">Realized P&amp;L</div></div>
      <div class="la-cell"><div class="la-val">${(data.open_positions||[]).length}</div><div class="la-lab">Open positions</div></div>
    </div>`;

  const open = data.open_positions||[], closed = data.closed_positions||[];
  const rows = [...open.map(p=>[p,'open']), ...closed.map(p=>[p,'closed'])];
  if (rows.length){
    h += `<table class="la-table"><thead><tr><th>Ticker</th><th>Qty</th><th>Exposure</th><th>Realized</th><th></th></tr></thead><tbody>`;
    for (const [p,st] of rows){
      h += `<tr>
        <td>${esc(p.ticker)}</td>
        <td>${p.qty}</td>
        <td>${money(p.exposure)}</td>
        <td class="${cls(p.realized)}">${p.realized?money(p.realized):'—'}</td>
        <td class="dim">${st==='open'?'open':'closed'}</td>
      </tr>`;
    }
    h += `</tbody></table>`;
  }

  const fills = (data.recent_fills||[]).slice(0,6);
  if (fills.length){
    h += `<table class="la-table"><thead><tr><th>Time</th><th>Ticker</th><th>Act</th><th>¢</th><th>Qty</th></tr></thead><tbody>`;
    for (const f of fills){
      const t = f.ts ? new Date(f.ts).toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'}) : '';
      h += `<tr><td class="dim">${esc(t)}</td><td>${esc(f.ticker)}</td>
        <td class="${f.action==='sell'?'la-pos':''}">${esc(f.action)}</td>
        <td>${f.price_c==null?'—':f.price_c+'¢'}</td><td>${esc(f.count)}</td></tr>`;
    }
    h += `</tbody></table>`;
  }
  h += `</div>`;
  el.innerHTML = h;
}

function renderRadar(data){
  const el = document.getElementById('radar');
  if (!el) return;
  if (!data || data.enabled===false){ el.innerHTML=''; return; }
  const cities = data.cities || {};
  const keys = Object.keys(cities).sort();
  if (!keys.length){
    el.innerHTML = `<div class="live-section"><div class="ls-title">Opportunity radar</div>
      <div class="price-empty">Waiting for first ladder poll…</div></div>`;
    return;
  }
  let totalAlerts = 0;
  const rows = keys.map(city => {
    const c = cities[city];
    totalAlerts += (c.alert_count||0);
    const rm = c.running_max!=null ? c.running_max.toFixed(1)+'°' : '—';
    const cs = c.certain_settle!=null ? 'settles ≥'+c.certain_settle+'°' : 'no obs verdict yet';
    const chips = (c.brackets||[]).map(b => {
      const bid = b.bid!=null ? b.bid : '–';
      const ask = b.ask!=null ? b.ask : '–';
      const cls = 'rd-chip rd-'+b.status + (b.alert?' rd-alert':'');
      const tag = b.alert ? `<div class="rd-tag">DEAD BID ${b.bid}¢</div>` : '';
      return `<div class="${cls}" title="${esc(b.ticker)} — ${b.status}">${tag}
        <div class="rd-lab">${esc(b.label||b.ticker)}</div>
        <div class="rd-px">${bid}/${ask}¢</div></div>`;
    }).join('');
    return `<div class="rd-row">
      <div class="rd-city"><b>${esc(city)}</b><span>obs max ${rm}</span><span>${cs}</span></div>
      <div class="rd-strip">${chips}</div></div>`;
  }).join('');
  const badge = totalAlerts ? `<span class="rd-alert-badge">${totalAlerts} dead-bracket bid${totalAlerts>1?'s':''} — free money</span>` : '';
  el.innerHTML = `<div class="live-section">
    <div class="price-head">
      <div class="ls-title" style="margin:0">Opportunity radar${badge}</div>
      <div class="sb-meta">dead = obs-killed · leader = holds running max · target = +1° CLI offset</div>
    </div>
    ${rows}</div>`;
}

function renderWalls(data){
  const el = document.getElementById('walls');
  if (!el) return;
  const walls = data.walls || [];
  if (!walls.length){
    el.innerHTML = `<div class="live-section"><div class="ls-title">Wall Watch</div>
      <div class="sb-meta">No certainty walls in today's shadow books — informed size shows up here when it arrives.</div></div>`;
    return;
  }
  let rows = '';
  for (const w of walls.slice(0, 14)){
    const age = w.first_seen ? fmtAge((Date.now() - new Date(w.first_seen))/1000) : '—';
    const fresh = w.first_seen && (Date.now() - new Date(w.first_seen)) < 3600e3;
    rows += `<div class="health-pill ${w.side === 'yes' ? 'warm' : 'neutral'}" ${fresh ? 'style="outline:1px solid var(--amber)"' : ''}>
      <span class="hp-name">${esc(w.ticker)} · ${w.side.toUpperCase()} wall</span>
      <span class="hp-age">${fmtVol(w.total)} @ ${w.band[0]}-${w.band[1]}¢ · ${w.ladder_levels} rungs · seen ${age} ago</span>
    </div>`;
  }
  el.innerHTML = `<div class="live-section">
    <div class="price-head"><div class="ls-title" style="margin:0">Wall Watch <span class="count">${walls.length}</span></div>
    <div class="sb-meta">resting size ≥1k/level or ≥3×500 rungs · a wall = a defended settlement thesis, not prey</div></div>
    <div class="health-strip">${rows}</div></div>`;
}

function setConn(ok){
  const el = document.getElementById('conn');
  if (el){ el.className = ok ? 'sb-meta ok' : 'sb-meta bad'; el.textContent = ok ? '● connected' : '● disconnected'; }
}

async function tick(){
  try {
    const r = await fetch('/api/state', { cache: 'no-store' });
    if (!r.ok) throw new Error('HTTP ' + r.status);
    const state = await r.json();
    renderLive(state);
    setConn(true);
    // Live account panel (real money)
    try {
      const lr = await fetch('/api/live', { cache: 'no-store' });
      if (lr.ok) renderLiveAccount(await lr.json());
    } catch (_) { /* keep last panel */ }
    // Live contract prices (independent — never let it break the bot panel)
    try {
      const pr = await fetch('/api/prices', { cache: 'no-store' });
      if (pr.ok) renderPrices(await pr.json());
    } catch (_) { /* keep last chart */ }
    // Live temperature (paired with the price chart)
    try {
      const tr = await fetch('/api/temps', { cache: 'no-store' });
      if (tr.ok) renderTemps(await tr.json());
    } catch (_) { /* keep last chart */ }
    // Opportunity radar (obs-vs-bracket join; independent of the charts)
    try {
      const rr = await fetch('/api/radar', { cache: 'no-store' });
      if (rr.ok) renderRadar(await rr.json());
    } catch (_) { /* keep last radar */ }
    // Wall watch (shadow-book informed-size scan)
    try {
      const wr = await fetch('/api/walls', { cache: 'no-store' });
      if (wr.ok) renderWalls(await wr.json());
    } catch (_) { /* keep last walls */ }
  } catch (err) {
    setConn(false);
    if (!document.querySelector('#live .status-banner')){
      document.getElementById('live').innerHTML = `<div class="loading">
        <div style="color:var(--red);font-size:1.1rem">Can't reach dashboard server</div>
        <div style="color:var(--text-dim)">${esc(err.message)} — start it with <code>.venv/bin/python3 dashboard_server.py</code></div>
      </div>`;
    }
  }
}

tick();
setInterval(tick, REFRESH_MS);
</script>
</body>
</html>
